<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mom &amp; Ben — Rome Business Class</title>
<style>
  :root{--bg:#0f1115;--card:#171a21;--card2:#1d212b;--line:#2a2f3a;--ink:#e9edf5;--mut:#9aa4b6;
    --accent:#4f8cff;--good:#39c07a;--gold:#f5c451;--flat:#37c8c3;--warn:#f5894f;--radius:14px;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1040px;margin:0 auto;padding:0 18px 60px}
  header{padding:34px 0 6px}
  h1{margin:0 0 4px;font-size:26px;letter-spacing:-.5px}
  .sub{color:var(--mut);font-size:14px;margin:0}
  .grid{display:grid;gap:14px}@media(min-width:680px){.grid.two{grid-template-columns:1fr 1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px}
  .card.star{border-color:rgba(245,196,81,.45);box-shadow:0 0 0 1px rgba(245,196,81,.16) inset}
  .thead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px}
  .route{font-weight:700;font-size:16px}
  .nts{color:var(--mut);font-size:12.5px;white-space:nowrap}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 7px;border-radius:5px;margin-right:5px}
  .tag.best{background:rgba(245,196,81,.16);color:var(--gold)}
  .tag.alt{background:rgba(79,140,255,.14);color:var(--accent)}
  .tag.over{background:rgba(245,137,79,.16);color:var(--warn)}
  .card.over{border-color:rgba(245,137,79,.3)}
  .leg{border-top:1px dashed var(--line);padding:10px 0}
  .leg .top{display:flex;justify-content:space-between;gap:8px}
  .leg .dir{font-size:10.5px;font-weight:700;color:var(--mut);background:var(--card2);padding:2px 6px;border-radius:4px}
  .leg .prog{font-weight:600}
  .leg .mi{font-variant-numeric:tabular-nums;color:var(--mut);font-size:13px;text-align:right;white-space:nowrap}
  .vline{margin-top:5px;font-size:13px;color:var(--mut)}
  .vline b{color:var(--ink);font-weight:600}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:1px 6px;border-radius:4px}
  .badge.flat{background:rgba(55,200,195,.16);color:var(--flat)}
  .badge.ver{background:rgba(57,192,122,.16);color:var(--good)}
  .badge.tov{background:rgba(245,137,79,.16);color:var(--warn)}
  .warn{margin-top:11px;font-size:12.8px;color:var(--warn);background:rgba(245,137,79,.09);border-radius:8px;padding:8px 11px;border-left:3px solid var(--warn)}
  .total{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:11px;border-top:1px solid var(--line)}
  .total .big{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
  .total .small{color:var(--mut);font-size:12px}
  .amex{margin-top:8px;font-size:12.5px;color:var(--accent);background:rgba(79,140,255,.08);border-radius:7px;padding:7px 10px}
  .checkout{margin-top:7px;font-size:12.5px;background:rgba(57,192,122,.07);border:1px solid rgba(57,192,122,.3);border-radius:8px;padding:9px 11px;line-height:1.5}
  .co-intro{color:var(--good);font-weight:600;margin-bottom:7px}
  .co-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .co-opt{display:flex;align-items:baseline;gap:7px;background:var(--card2);border:1px solid var(--line);border-radius:7px;padding:6px 9px}
  .co-opt.best{border-color:var(--good);background:rgba(57,192,122,.12)}
  .co-pts{font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink)}
  .co-cash{color:var(--mut);font-size:11.5px}
  .co-flag{margin-left:auto;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--good)}
  .co-flag.pop{color:var(--mut)}
  .co-rec{color:var(--mut);margin-top:8px}
  .ash-sub{color:var(--mut);font-size:13.5px;margin:2px 0 10px}
  .ash-grid{display:grid;gap:14px;margin-top:12px}@media(min-width:680px){.ash-grid{grid-template-columns:1fr 1fr}}
  .ash-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);margin:0 0 4px}
  .ash-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px dashed var(--line);font-size:13px}
  .ash-row b{color:var(--ink);white-space:nowrap}
  .ash-row span{color:var(--mut);text-align:right}
  .ash-sech{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin:16px 0 2px}
  .ash-opt-grid{display:grid;gap:12px;margin:8px 0}@media(min-width:680px){.ash-opt-grid{grid-template-columns:1fr 1fr}}
  .ash-opt{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .ash-opt.star{border-color:rgba(245,196,81,.45);box-shadow:0 0 0 1px rgba(245,196,81,.16) inset}
  .ash-opt-h{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .ash-opt-route{font-weight:700;font-size:15px}
  .ash-opt-d{color:var(--mut);font-size:12.5px;margin-bottom:7px}
  .ash-opt-p{margin-top:8px;padding-top:7px;border-top:1px solid var(--line);font-weight:800;font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums}
  footer{color:var(--mut);font-size:12.5px;text-align:center;margin-top:36px;line-height:1.6}
  .who{display:flex;gap:8px;margin:16px 0 4px}
  .who button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--mut);font-size:15px;font-weight:800;padding:13px;border-radius:12px;cursor:pointer}
  .who button.on{background:var(--card2);color:var(--ink);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .tabs{display:flex;gap:6px;margin:18px 0 4px}
  .tabs button{background:var(--card);border:1px solid var(--line);color:var(--mut);font-size:14px;font-weight:700;padding:9px 18px;border-radius:10px;cursor:pointer}
  .tabs button.on{background:var(--card2);color:var(--ink);border-color:var(--accent)}
  .note{color:var(--ink);font-size:13px;margin:10px 0 0;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:9px;padding:11px 13px}
  .note.gold{border-left-color:var(--gold)}
  .info h2{font-size:17px;margin:2px 0 10px}
  .info ul{margin:0;padding-left:18px}
  .info li{margin:0 0 9px;color:var(--mut);font-size:13.5px;line-height:1.55}
  .info li b{color:var(--ink)}
  .correction-banner{margin:16px 0 0;background:rgba(245,137,79,.12);border:1px solid rgba(245,137,79,.5);border-left:4px solid var(--warn);border-radius:10px;padding:13px 15px;font-size:13.5px;color:var(--ink);line-height:1.55}
  .book-banner{margin:14px 0 0;background:rgba(57,192,122,.10);border:1px solid rgba(57,192,122,.45);border-left:4px solid var(--good);border-radius:10px;padding:12px 14px;font-size:13.5px;color:var(--ink);line-height:1.55}
  .book-banner b{color:var(--good)}
  .bonus-banner{margin:10px 0 0;background:linear-gradient(90deg,rgba(245,196,81,.14),rgba(245,137,79,.10));border:1px solid rgba(245,196,81,.4);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--ink);line-height:1.5}
  .bonus-banner b{color:var(--gold)}
  .small.bonus{color:var(--good);font-weight:700}
  .pts-was{color:var(--mut);font-size:11.5px}
  .plan-h{font-size:19px;margin:18px 0 10px;letter-spacing:-.3px}
  .section-h{font-size:13.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin:30px 0 4px;border-top:1px solid var(--line);padding-top:20px}
  #plan .card{border-color:rgba(57,192,122,.5);box-shadow:0 0 0 1px rgba(57,192,122,.18) inset}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>✈️ Business-class award trips · the options</h1>
    <p class="sub">Confirmed lie-flat options on Amex points · nothing booked — re-check availability before transferring</p>
  </header>
  <div class="who"><button id="who-mom" class="on">Mom &amp; Ben</button><button id="who-ash">Ashley + Emrey</button></div>
  <div id="mom-section">
    <div id="london"></div>
    <div id="rome-af"></div>
  </div>
  <div id="ash-section" style="display:none"></div>
  <footer id="foot"></footer>
</div>
<script src="data.js?v=20260623l"></script>
<script>
const $=s=>document.querySelector(s),ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};

function dateTable(title,rows){
  const trs=rows.map(d=>`<tr style="border-top:1px solid var(--line)">
    <td style="padding:7px 10px;font-weight:700;color:var(--ink);white-space:nowrap">${d.date}${d.tag?` <span style="font-size:11px;font-weight:700;color:var(--good)">★ ${d.tag}</span>`:''}</td>
    <td style="padding:7px 10px;color:var(--mut);font-variant-numeric:tabular-nums;white-space:nowrap">${d.each} <span style="font-size:11px">each</span></td>
    <td style="padding:7px 10px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap">${d.two} <span style="font-size:11px;color:var(--mut)">for two</span></td></tr>`).join('');
  return `<div style="margin:12px 0 4px;font-size:12.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px">${title}</div>`
    +`<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:13.5px"><tbody>${trs}</tbody></table></div>`;
}
function optionCard(r,mountId){
  if(!r)return;
  const c=ce('div','card info');c.style.marginTop='28px';
  const rows=r.flights.map(f=>`<tr style="border-top:1px solid var(--line)">
    <td style="padding:8px 10px;font-weight:700;color:var(--ink);vertical-align:top">${f.air}</td>
    <td style="padding:8px 10px;color:var(--ink)">${f.route}<div style="font-size:12px;color:var(--mut);margin-top:2px">${f.dur?f.dur+' · ':''}${f.plane}</div></td>
    <td style="padding:8px 10px;white-space:nowrap;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;vertical-align:top">${f.miles}</td>
    <td style="padding:8px 10px;font-size:12px;font-weight:700;vertical-align:top;color:${(f.seat||'').includes('1 seat')?'var(--warn)':'var(--good)'}">${f.seat||''}</td></tr>`).join('');
  c.innerHTML=`<h2>${r.headline}</h2><p style="color:var(--mut);font-size:13.5px">${r.sub}</p>`
    +`<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;margin:12px 0;font-size:13.5px"><tbody>${rows}</tbody></table></div>`
    +(r.outbound?dateTable('📅 Outbound · NYC → Rome — pick a date',r.outbound):'')
    +(r.returns?dateTable('📅 Return · Rome → NYC — pick a date',r.returns):'')
    +(r.calendar?`<p style="font-size:13px;color:var(--mut);margin:8px 0">${r.calendar}</p>`:'')
    +(r.roundtrip?`<p style="background:rgba(57,192,122,.10);border:1px solid rgba(57,192,122,.4);border-radius:8px;padding:10px 12px;font-size:13.5px;color:var(--ink);font-weight:600;margin:10px 0">${r.roundtrip}</p>`:'')
    +(r.maycompare?`<p style="font-size:13px;color:var(--mut);margin:8px 0">${r.maycompare}</p>`:'')
    +(r.note?`<p class="warn" style="font-size:13px">${r.note}</p>`:'')
    +`<p style="font-weight:700;color:var(--ink);margin-top:12px;font-size:14px">${r.bottom}</p>`;
  $(mountId).appendChild(c);
}
optionCard(DATA.london,'#london');
optionCard(DATA.rome_af,'#rome-af');
$('#foot').textContent=DATA.footer;

function renderAshley(){
  const a=DATA.ashley; if(!a)return; const s=$('#ash-section'); s.innerHTML='';
  const c=ce('div','card star');
  const col=(label,rows)=>`<div><div class="ash-h">${label}</div>`+
    rows.map(x=>`<div class="ash-row"><b>${x.w}</b><span>${x.a}</span></div>`).join('')+`</div>`;
  const opt=t=>`<div class="ash-opt${t.star?' star':''}">
    <div class="ash-opt-h"><span class="tag ${t.tagcls}">${t.tag}</span><span class="ash-opt-route">${t.route}</span></div>
    <div class="ash-opt-d">${t.depart} → ${t.home} · ${t.nights} nights</div>
    <div class="vline"><b style="color:var(--mut)">OUT</b> · ${t.out}</div>
    <div class="vline"><b style="color:var(--mut)">BACK</b> · ${t.ret}</div>
    <div class="ash-opt-p">${t.pts} · ${t.cash}</div></div>`;
  c.innerHTML=`<div class="thead"><div class="route">${a.headline}</div></div>`
    +`<p class="ash-sub">${a.sub}</p>`
    +`<div class="amex">💳 ${a.play}</div>`
    +`<div class="ash-sech">Round-trips to pick from</div>`
    +`<div class="ash-opt-grid">${a.trips.map(opt).join('')}</div>`;
  s.appendChild(c);
}
renderAshley();
$('#who-mom').onclick=()=>{$('#who-mom').classList.add('on');$('#who-ash').classList.remove('on');$('#mom-section').style.display='';$('#ash-section').style.display='none';window.scrollTo(0,0);};
$('#who-ash').onclick=()=>{$('#who-ash').classList.add('on');$('#who-mom').classList.remove('on');$('#ash-section').style.display='';$('#mom-section').style.display='none';window.scrollTo(0,0);};

</script>
</body>
</html>
